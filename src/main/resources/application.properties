# ══ LearnCode Adventure ══
server.port=8080

# H2 — Base de données embarquée (fichier local)
spring.datasource.url=jdbc:h2:file:./learncode_db;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 (voir la base : http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Désactiver data.sql (on gère les données dans Java)
spring.sql.init.mode=never

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Encodage
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Logs
logging.level.com.learncode=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
